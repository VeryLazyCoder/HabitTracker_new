<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Habit Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/app/habits">Habit Tracker</a>
        <nav class="nav">
            {% if current_user %}
                <a href="/app/habits">Привычки</a>
                <a href="/app/habits/new">Новая</a>
                <span class="user-name">{{ current_user.username }}</span>
                <form action="/app/logout" method="post">
                    <button class="button button-ghost" type="submit">Выйти</button>
                </form>
            {% else %}
                <a href="/app/login">Войти</a>
                <a href="/app/register">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main class="page">
        {% if message %}
            <div class="flash flash-success">{{ message }}</div>
        {% endif %}
        {% if error %}
            <div class="flash flash-error">{{ error }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
