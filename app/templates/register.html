{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="auth-layout">
    <form class="panel auth-panel" action="/app/register" method="post">
        {# После регистрации пользователь сразу получает session-cookie. #}
        <h1>Регистрация</h1>

        <label>
            Имя пользователя
            <input name="username" value="{{ form.get('username', '') }}" autocomplete="username" minlength="3" required>
        </label>

        <label>
            Email
            <input name="email" type="email" value="{{ form.get('email', '') }}" autocomplete="email" required>
        </label>

        <label>
            Пароль
            <input name="password" type="password" autocomplete="new-password" minlength="6" required>
        </label>

        <button class="button button-primary" type="submit">Создать аккаунт</button>
        <p class="muted">Уже есть аккаунт? <a href="/app/login">Войти</a></p>
    </form>
</section>
{% endblock %}
